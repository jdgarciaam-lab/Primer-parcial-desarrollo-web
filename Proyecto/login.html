<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Futtzap – Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <span class="brand-icon">⚽</span>
      <h1 class="brand-name">FUTTZAP</h1>
      <p class="brand-tagline">Tu tienda de zapatillas de fútbol</p>
    </div>

    <form class="login-form" id="loginForm" onsubmit="return false;">
      <h2 class="form-title">Acceder</h2>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="off"/>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña"/>
      </div>

      <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>

      <button type="button" class="btn-login" onclick="handleLogin()">Ingresar</button>

      <p class="login-note">
        ⚠️ <strong>Solo fines educativos.</strong> Las credenciales están embebidas en el código y no son seguras para producción.
      </p>
    </form>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
