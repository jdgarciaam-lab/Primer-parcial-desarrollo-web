<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Futtzap – Tienda</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Fragmento: encabezado -->
  <div id="header-container"></div>

  <div class="app-layout">
    <!-- Fragmento: barra lateral -->
    <div id="sidebar-container"></div>

    <main class="main-content" id="mainContent">
      <section class="hero-section">
        <h2 class="hero-title">Nueva Temporada</h2>
        <p class="hero-sub">Las mejores zapatillas para conquistar el campo</p>
      </section>

      <!-- Grilla de productos -->
      <section class="products-section">
        <h3 class="section-title">Nuestros Productos</h3>
        <div class="products-grid" id="productsGrid"></div>
      </section>
    </main>
  </div>

  <!-- Fragmento: pie de página -->
  <div id="footer-container"></div>

  <!-- Panel del Carrito (Modal lateral) -->
  <div id="cartPanel" class="cart-panel">
    <div class="cart-panel-header">
      <h2>Mi Carrito</h2>
      <button id="cartCloseBtn" class="cart-close-btn">✕</button>
    </div>
    <div class="cart-panel-content">
      <div id="cartPanelItems" class="cart-panel-items"></div>
      <div id="cartPanelEmpty" class="cart-panel-empty">
        <p>Tu carrito está vacío</p>
      </div>
    </div>
    <div class="cart-panel-footer">
      <div class="cart-panel-summary">
        <div class="summary-line">
          <span>Subtotal:</span>
          <span id="panelSubtotal">$0</span>
        </div>
        <div class="summary-line total">
          <span>Total:</span>
          <span id="panelTotal">$0</span>
        </div>
      </div>
      <button id="cartCheckoutBtn" class="cart-checkout-btn">Comprar 💳</button>
    </div>
  </div>

  <!-- Overlay detrás del carrito -->
  <div id="cartOverlay" class="cart-overlay"></div>

  <style>
    /* Panel del Carrito */
    .cart-panel {
      position: fixed;
      right: -400px;
      top: 64px;
      width: 400px;
      height: calc(100vh - 64px - 52px);
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: right 0.3s ease;
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.3);
    }

    .cart-panel.active {
      right: 0;
    }

    .cart-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .cart-panel-header h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--color-accent);
      letter-spacing: 2px;
      margin: 0;
    }

    .cart-close-btn {
      background: transparent;
      border: none;
      color: var(--color-text);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.25s;
    }

    .cart-close-btn:hover {
      color: var(--color-accent);
    }

    .cart-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .cart-panel-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cart-panel-item {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      gap: 12px;
    }

    .cart-panel-item-img {
      width: 60px;
      height: 60px;
      background: var(--color-bg);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .cart-panel-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-panel-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cart-panel-item-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text);
    }

    .cart-panel-item-price {
      color: var(--color-accent);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .cart-panel-item-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 2px 4px;
      width: fit-content;
    }

    .cart-panel-item-controls button {
      background: transparent;
      border: none;
      color: var(--color-accent);
      cursor: pointer;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-panel-item-controls input {
      width: 30px;
      background: transparent;
      border: none;
      color: var(--color-text);
      text-align: center;
      font-size: 0.85rem;
    }

    .cart-panel-item-remove {
      background: transparent;
      border: 1px solid var(--color-error);
      color: var(--color-error);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: background 0.25s;
    }

    .cart-panel-item-remove:hover {
      background: var(--color-error);
      color: #fff;
    }

    .cart-panel-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-muted);
    }

    .cart-panel-footer {
      border-top: 1px solid var(--color-border);
      padding: 16px;
      background: var(--color-surface-2);
    }

    .cart-panel-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--color-text);
    }

    .summary-line.total {
      border-top: 1px solid var(--color-border);
      padding-top: 8px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-accent);
    }

    .cart-checkout-btn {
      width: 100%;
      background: var(--color-accent);
      border: none;
      color: #000;
      padding: 10px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.25s;
    }

    .cart-checkout-btn:hover {
      background: var(--color-accent-dim);
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.3s ease;
    }

    .cart-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      .cart-panel {
        width: 100%;
        right: -100%;
      }
    }
  </style>

  <!-- Template de producto (renderizado con cloneNode en main.js) -->
  <template id="product-template">
    <div class="product-card">
      <div class="product-img-wrap">
        <img class="product-img" src="" alt=""/>
      </div>
      <div class="product-info">
        <h4 class="product-name"></h4>
        <p class="product-desc"></p>
        <div class="product-footer">
          <span class="product-price"></span>
          <button class="btn-add">Agregar ⚡</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Web Component personalizado -->
  <script src="js/product-card.js"></script>
  <!-- Lógica del carrito -->
  <script src="js/cart.js"></script>
  <!-- Lógica principal -->
  <script src="js/main.js"></script>
</body>
</html>
